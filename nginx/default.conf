server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # .env 등 dotfile 접근 차단
    location ~ /\. {
        deny all;
        return 404;
    }

    # .env → envsubst로 생성된 config.js (읽기 전용 마운트 밖, /tmp에 기록됨)
    location = /config.js {
        alias /tmp/config.js;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # 정적 파일 서빙 — 기본 파일: 대시보드 HTML
    location / {
        try_files $uri "/vLLM Cluster Monitor.dc.html" =404;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Prometheus API 역방향 프록시
    # 브라우저에서 /api/prometheus/api/v1/query 로 직접 쿼리 가능
    location /api/prometheus/ {
        proxy_pass         http://prometheus:9090/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;

        # CORS: 동일 도메인 프론트엔드에서 fetch 허용
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Grafana UI 역방향 프록시
    location /grafana/ {
        proxy_pass         http://grafana:3000/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }
}
